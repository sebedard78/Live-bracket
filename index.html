<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Live Bracket Viewer - ULTRA SHARP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #010409; 
            color: white; 
            margin: 0; 
            overflow: hidden;
            /* Force the browser to prioritize sharp text over smooth animations */
            text-rendering: optimizeSpeed;
            -webkit-font-smoothing: none; 
            image-rendering: pixelated;
        }
        
        .bracket-outer { 
            width: 100vw; 
            height: calc(100vh - 90px); 
            overflow: auto; 
            background: #010409; 
            position: relative;
        }

        /* THE FIX: We use zoom instead of transform scale */
        #zoomLayer { 
            zoom: 1; 
            display: inline-flex; 
            transform-origin: 0 0;
        }

        .bracket-scroll { 
            display: flex; 
            gap: 60px; 
            padding: 60px; 
            align-items: flex-start; 
        }

        .round-col { display: flex; flex-direction: column; gap: 40px; min-width: 320px; }
        
        .round-title { 
            font-size: 18px; /* Bigger base font */
            font-weight: 900; 
            color: #8b949e; 
            text-transform: uppercase; 
            text-align: center; 
            border-bottom: 4px solid #30363d; /* Thicker lines for TV */
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            letter-spacing: 3px;
        }
        
        .match-card { 
            background: #0d1117; 
            border: 3px solid #30363d; /* Thicker border */
            border-radius: 20px; 
            overflow: hidden; 
            width: 300px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .team-line { 
            display: flex; 
            justify-content: space-between; 
            padding: 20px; 
            font-size: 20px; /* Larger base size */
            font-weight: 900; 
            border-bottom: 3px solid #010409; 
            color: #c9d1d9; 
        }

        /* High contrast for winners */
        .team-line.win { 
            background: #0ea5e9; 
            color: #000000; 
        }
        .team-line.win .score-box {
            background: #000000;
            color: #0ea5e9;
        }

        .score-box { 
            background: #161b22; 
            color: #fff; 
            padding: 6px 15px; 
            border-radius: 10px; 
            min-width: 55px; 
            text-align: center;
            font-weight: 900;
            font-size: 22px;
        }

        /* Thicker Scrollbars */
        .bracket-outer::-webkit-scrollbar { width: 16px; height: 16px; }
        .bracket-outer::-webkit-scrollbar-track { background: #010409; }
        .bracket-outer::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; border: 4px solid #010409; }

        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body>

    <header class="h-[90px] bg-black border-b-4 border-zinc-800 px-10 flex justify-between items-center relative z-50">
        <div>
            <h1 class="text-3xl font-black italic uppercase text-sky-400 leading-none tracking-tighter">Tournament Bracket</h1>
            <div class="flex items-center gap-3 mt-2">
                <span class="w-3 h-3 bg-green-500 rounded-full pulse-live"></span>
                <p id="matchCount" class="text-[14px] text-zinc-400 font-black uppercase tracking-widest">Live Feed Connected</p>
            </div>
        </div>

        <div class="flex items-center gap-8">
            <div class="flex bg-zinc-900 rounded-2xl p-2 border-2 border-zinc-700">
                <button onclick="changeZoom(0.2)" class="px-8 py-2 hover:bg-zinc-800 font-black text-white text-2xl">+</button>
                <button onclick="changeZoom(-0.2)" class="px-8 py-2 hover:bg-zinc-800 font-black text-white text-2xl">-</button>
                <button onclick="changeZoom('reset')" class="px-6 py-2 text-[14px] uppercase font-black text-zinc-500 border-l-2 border-zinc-700">Reset</button>
            </div>
        </div>
    </header>

    <main class="bracket-outer">
        <div id="zoomLayer">
            <div class="bracket-scroll" id="bracketContent">
                <div class="py-40 px-20 text-zinc-600 font-black text-3xl uppercase tracking-tighter">Loading HD Data...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentZoom = 1.0;
        let tData = null;

        // Sharp Zooming Logic
        window.changeZoom = (delta) => {
            const layer = document.getElementById('zoomLayer');
            if (delta === 'reset') currentZoom = 1.0;
            else currentZoom = Math.max(0.4, Math.min(4.0, currentZoom + delta));
            
            // This property forces the browser to re-render the font glyphs 
            // at the actual physical screen pixels.
            layer.style.zoom = currentZoom;
        };

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) {
                tData = snap.data();
                renderBracket();
            }
        });

        function renderBracket() {
            if (!tData || !tData.bracket) return;
            const b = tData.bracket;
            const container = document.getElementById('bracketContent');
            const rosterSize = tData.roster ? tData.roster.length : 0;
            const size = Math.pow(2, Math.ceil(Math.log2(rosterSize || 2)));
            const wRounds = Math.log2(size);

            let html = "";
            for (let r = 1; r <= wRounds; r++) {
                html += `<div class="round-col"><div class="round-title">Winners R${r}</div>`;
                html += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => renderCard(m)).join('');
                html += `</div>`;
            }
            html += `<div class="round-col"><div class="round-title">Finals</div>`;
            html += b.winners.filter(x => x.id.startsWith('GF')).map(m => renderCard(m)).join('');
            html += `</div>`;
            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                html += `<div class="round-col"><div class="round-title">Losers R${r}</div>`;
                html += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => renderCard(m)).join('');
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function renderCard(m) {
            const t1Name = m.t1?.name || 'TBD';
            const t2Name = m.t2?.name || 'TBD';
            return `
                <div class="match-card">
                    <div class="team-line ${m.win === t1Name && t1Name !== 'TBD' ? 'win' : ''}">
                        <span class="truncate pr-4">${t1Name}</span>
                        <span class="score-box">${m.s1 || 0}</span>
                    </div>
                    <div class="team-line ${m.win === t2Name && t2Name !== 'TBD' ? 'win' : ''}">
                        <span class="truncate pr-4">${t2Name}</span>
                        <span class="score-box">${m.s2 || 0}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
