<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Live Bracket Viewer - HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            overflow: hidden;
            /* Anti-aliasing for TV screens */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* THE FIX: Force high-quality rendering during scale */
        .bracket-outer { 
            width: 100vw; 
            height: calc(100vh - 80px); 
            overflow: auto; 
            background: #020617; 
            position: relative;
            perspective: 1000px; /* Helps with sub-pixel rendering */
        }

        .bracket-scale-layer { 
            transform-origin: 0 0; 
            transition: transform 0.1s ease-out; 
            display: inline-flex; 
            /* Forces browser to treat this as a high-res layer */
            backface-visibility: hidden;
            will-change: transform;
        }

        .bracket-scroll { 
            display: flex; 
            gap: 40px; 
            padding: 50px; 
            align-items: flex-start; 
        }

        /* Increased base font sizes for better TV clarity */
        .round-col { display: flex; flex-direction: column; gap: 35px; min-width: 280px; }
        .round-title { 
            font-size: 14px; 
            font-weight: 900; 
            color: #64748b; 
            text-transform: uppercase; 
            text-align: center; 
            border-bottom: 2px solid #1e293b; 
            margin-bottom: 15px; 
            padding-bottom: 8px; 
            letter-spacing: 2px;
        }
        
        .match-card { 
            background: #111827; 
            border: 2px solid #1e293b; 
            border-radius: 16px; 
            overflow: hidden; 
            width: 260px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .team-line { 
            display: flex; 
            justify-content: space-between; 
            padding: 16px; 
            font-size: 16px; /* Larger base font */
            font-weight: 800; 
            border-bottom: 2px solid #020617; 
            color: white; 
        }

        .team-line.win { background: #083344; color: #22d3ee; }
        
        .score-box { 
            background: #000; 
            color: #fff; 
            padding: 4px 12px; 
            border-radius: 8px; 
            min-width: 45px; 
            text-align: center;
            font-family: monospace;
            font-size: 18px;
        }
        
        /* Scrollbar Styling */
        .bracket-outer::-webkit-scrollbar { width: 12px; height: 12px; }
        .bracket-outer::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 3px solid #020617; }

        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body>

    <header class="h-20 bg-black border-b border-zinc-800 px-8 flex justify-between items-center relative z-50 shadow-2xl">
        <div>
            <h1 class="text-2xl font-black italic uppercase text-sky-400 leading-none tracking-tighter">Tournament Bracket</h1>
            <p class="text-[12px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Live HD View Mode</p>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex bg-zinc-900 rounded-xl p-1 border-2 border-zinc-800">
                <button onclick="zoom(0.1)" class="px-6 py-2 hover:bg-zinc-800 font-black text-white text-xl">+</button>
                <button onclick="zoom(-0.1)" class="px-6 py-2 hover:bg-zinc-800 font-black text-white text-xl">-</button>
                <button onclick="zoom('reset')" class="px-4 py-1 text-[12px] uppercase font-black text-zinc-500 border-l-2 border-zinc-800">Reset</button>
            </div>
            <div class="text-right">
                <div class="flex items-center gap-2 justify-end">
                    <span class="w-3 h-3 bg-green-500 rounded-full pulse-live shadow-[0_0_10px_#22c55e]"></span>
                    <span id="matchCount" class="text-[12px] font-black text-zinc-400 uppercase tracking-tighter">Connecting...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="bracket-outer" id="bracketOuter">
        <!-- transform: scale(1) is default -->
        <div class="bracket-scale-layer" id="scaleLayer" style="transform: scale(1.0);">
            <div class="bracket-scroll" id="bracketContent">
                <div class="py-20 px-10 text-zinc-600 italic text-2xl">Initializing High-Definition Feed...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bScale = 1.0;
        let tData = null;

        // Enhanced Zoom Logic for TVs
        window.zoom = (delta) => {
            if (delta === 'reset') bScale = 1.0;
            else bScale = Math.max(0.1, Math.min(3.0, bScale + delta));
            
            const layer = document.getElementById('scaleLayer');
            // Using translateZ(0) triggers hardware acceleration for sharper text
            layer.style.transform = `scale(${bScale}) translateZ(0)`;
        };

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) {
                tData = snap.data();
                renderBracket();
            }
        });

        function renderBracket() {
            if (!tData || !tData.bracket) return;
            const b = tData.bracket;
            const container = document.getElementById('bracketContent');
            const rosterSize = tData.roster ? tData.roster.length : 0;
            const size = Math.pow(2, Math.ceil(Math.log2(rosterSize || 2)));
            const wRounds = Math.log2(size);

            let html = "";

            for (let r = 1; r <= wRounds; r++) {
                html += `<div class="round-col"><div class="round-title">Winners R${r}</div>`;
                html += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => renderCard(m)).join('');
                html += `</div>`;
            }

            html += `<div class="round-col"><div class="round-title">Championship</div>`;
            html += b.winners.filter(x => x.id.startsWith('GF')).map(m => renderCard(m)).join('');
            html += `</div>`;

            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                html += `<div class="round-col"><div class="round-title">Losers R${r}</div>`;
                html += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => renderCard(m)).join('');
                html += `</div>`;
            }

            container.innerHTML = html;
            document.getElementById('matchCount').innerText = `Live: ${rosterSize} Teams`;
        }

        function renderCard(m) {
            const t1Name = m.t1?.name || 'TBD';
            const t2Name = m.t2?.name || 'TBD';
            const s1 = m.s1 || 0;
            const s2 = m.s2 || 0;
            
            return `
                <div class="match-card">
                    <div class="team-line ${m.win === t1Name && t1Name !== 'TBD' ? 'win' : ''}">
                        <span class="truncate pr-4">${t1Name}</span>
                        <span class="score-box">${s1}</span>
                    </div>
                    <div class="team-line ${m.win === t2Name && t2Name !== 'TBD' ? 'win' : ''}">
                        <span class="truncate pr-4">${t2Name}</span>
                        <span class="score-box">${s2}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
