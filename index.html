<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Bracket - TV Clear View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Loading a Condensed font which is much easier to read on TVs */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            background-color: #000; 
            color: white; 
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-rows: 1fr 100px 1.2fr; /* Allocates space strictly */
            height: 100vh;
            padding: 5px;
            gap: 5px;
        }

        .bracket-zone {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border: 1px solid #1e293b;
            padding: 4px;
            overflow: hidden;
        }

        .zone-label {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            color: #38bdf8;
            text-align: center;
            padding: 2px;
            background: #111;
            border-bottom: 1px solid #1e293b;
        }

        .rounds-grid {
            display: flex;
            flex: 1;
            gap: 4px;
            align-items: stretch;
        }

        .round-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Spreads matches out to stop cramping */
            gap: 2px;
        }

        /* THE CARD: Cleaned up for maximum sharpness */
        .match-card {
            background: #161b22;
            border-left: 4px solid #30363d;
            display: flex;
            flex-direction: column;
            margin-bottom: 2px;
        }

        .match-card.active { border-left-color: #0ea5e9; }

        .team-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: 15px; /* Large and clear */
            font-weight: 700;
            border-bottom: 1px solid #000;
            white-space: nowrap;
        }

        /* Zebra striping for clarity */
        .team-strip:nth-child(even) { background: rgba(255,255,255,0.03); }

        .team-strip.win { background: #0ea5e9 !important; color: #000; font-weight: 900; }
        
        .name-txt {
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .score-val {
            font-family: monospace;
            font-size: 16px;
            font-weight: 900;
            margin-left: 10px;
        }

        /* Finals Styling */
        .finals-zone {
            background: #000;
            border: 2px solid #0ea5e9;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .finals-card { width: 300px; transform: scale(1.1); }

    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- WINNERS -->
        <div class="bracket-zone">
            <div class="zone-label">Winners Bracket</div>
            <div class="rounds-grid" id="winnersContent"></div>
        </div>

        <!-- CHAMPIONSHIP -->
        <div class="finals-zone" id="finalsContent">
            <!-- Finals will be injected here -->
        </div>

        <!-- LOSERS -->
        <div class="bracket-zone">
            <div class="zone-label" style="color: #fb923c;">Losers Bracket</div>
            <div class="rounds-grid" id="losersContent"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) render(snap.data());
        });

        function render(data) {
            const b = data.bracket;
            const size = Math.pow(2, Math.ceil(Math.log2(data.roster?.length || 2)));
            const wRounds = Math.log2(size);

            // Render Winners - spread out using justify-around
            let wHtml = "";
            for (let r = 1; r <= wRounds; r++) {
                wHtml += `<div class="round-col">`;
                wHtml += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => createCard(m)).join('');
                wHtml += `</div>`;
            }
            document.getElementById('winnersContent').innerHTML = wHtml;

            // Render Finals - Big Center Match
            const gf = b.winners.find(x => x.id.startsWith('GF'));
            document.getElementById('finalsContent').innerHTML = `
                <div class="text-sky-500 font-black italic uppercase text-xl">CHAMPIONSHIP</div>
                <div class="finals-card">${createCard(gf)}</div>
            `;

            // Render Losers
            let lHtml = "";
            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                lHtml += `<div class="round-col">`;
                lHtml += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => createCard(m)).join('');
                lHtml += `</div>`;
            }
            document.getElementById('losersContent').innerHTML = lHtml;
        }

        function createCard(m) {
            if (!m) return "";
            const t1 = m.t1?.name || 'TBD';
            const t2 = m.t2?.name || 'TBD';
            const isBye = m.s1 === 'BYE' || m.s2 === 'BYE';
            
            return `
                <div class="match-card ${!m.win && t1 !== 'TBD' && t2 !== 'TBD' ? 'active' : ''}">
                    <div class="team-strip ${m.win === t1 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t1}</span>
                        <span class="score-val">${m.s1 || 0}</span>
                    </div>
                    <div class="team-strip ${m.win === t2 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t2}</span>
                        <span class="score-val">${m.s2 || 0}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
