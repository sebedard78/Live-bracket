<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Viewer - Split Screen Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER AREA */
        header {
            height: 60px;
            background: #111;
            border-bottom: 2px solid #0ea5e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* THE FIX: Vertical Stacking for Split Screens */
        .bracket-container {
            display: flex;
            flex-direction: column; /* Stack Winners on top of Losers */
            gap: 50px;
            padding: 30px;
            width: 100%;
        }

        .bracket-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-label {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            color: #0ea5e9;
            border-left: 8px solid #0ea5e9;
            padding-left: 15px;
            margin-bottom: 10px;
            background: rgba(14, 165, 233, 0.1);
        }

        /* Horizontal rounds within the stack */
        .rounds-row {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            padding-bottom: 20px;
            align-items: flex-start;
        }

        .round-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 280px; /* Wider cards for readability */
        }

        .round-name {
            font-size: 14px;
            font-weight: 900;
            color: #64748b;
            text-transform: uppercase;
            text-align: center;
            padding: 5px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px;
        }

        /* MATCH CARDS - High Contrast for distance viewing */
        .match-card {
            background: #111827;
            border: 3px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 18px; /* Big font for the TV */
            font-weight: 800;
            border-bottom: 2px solid #000;
        }

        .team-row.winner {
            background: #0ea5e9;
            color: #000;
        }

        .score-box {
            background: #000;
            color: #fff;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 20px;
            min-width: 45px;
            text-align: center;
        }

        .team-row.winner .score-box {
            background: #fff;
            color: #000;
        }

        /* Scrollbar for Rounds */
        .rounds-row::-webkit-scrollbar { height: 10px; }
        .rounds-row::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .pulse-dot {
            width: 10px; height: 10px; background: #22c55e; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">LP Bracket</h1>
            <span class="bg-zinc-800 text-zinc-400 text-[10px] px-2 py-1 font-bold rounded">LIVE FEED</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="pulse-dot"></div>
            <span class="text-[11px] font-black uppercase text-zinc-500">Cloud Sync Active</span>
        </div>
    </header>

    <main class="bracket-container" id="zoomLayer">
        
        <!-- WINNERS SECTION -->
        <div class="bracket-section">
            <h2 class="section-label">Winners Bracket</h2>
            <div class="rounds-row" id="winnersRow">
                <!-- Javascript will inject here -->
            </div>
        </div>

        <!-- LOSERS SECTION -->
        <div class="bracket-section">
            <h2 class="section-label">Losers Bracket</h2>
            <div class="rounds-row" id="losersRow">
                <!-- Javascript will inject here -->
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) render(snap.data());
        });

        function render(data) {
            const b = data.bracket;
            const rosterSize = data.roster ? data.roster.length : 0;
            const size = Math.pow(2, Math.ceil(Math.log2(rosterSize || 2)));
            const wRounds = Math.log2(size);

            const winnersContainer = document.getElementById('winnersRow');
            const losersContainer = document.getElementById('losersRow');

            // Build Winners
            let wHtml = "";
            for (let r = 1; r <= wRounds; r++) {
                wHtml += `<div class="round-column"><div class="round-name">Round ${r}</div>`;
                wHtml += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => createCard(m)).join('');
                wHtml += `</div>`;
            }
            // Add Finals to winners row
            wHtml += `<div class="round-column"><div class="round-name text-sky-400">Championship</div>`;
            wHtml += b.winners.filter(x => x.id.startsWith('GF')).map(m => createCard(m)).join('');
            wHtml += `</div>`;
            winnersContainer.innerHTML = wHtml;

            // Build Losers
            let lHtml = "";
            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                lHtml += `<div class="round-column"><div class="round-name">Losers R${r}</div>`;
                lHtml += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => createCard(m)).join('');
                lHtml += `</div>`;
            }
            losersContainer.innerHTML = lHtml;
        }

        function createCard(m) {
            const t1Name = m.t1?.name || 'TBD';
            const t2Name = m.t2?.name || 'TBD';
            return `
                <div class="match-card">
                    <div class="team-row ${m.win === t1Name && t1Name !== 'TBD' ? 'winner' : ''}">
                        <span class="truncate">${t1Name}</span>
                        <span class="score-box">${m.s1 || 0}</span>
                    </div>
                    <div class="team-row ${m.win === t2Name && t2Name !== 'TBD' ? 'winner' : ''}">
                        <span class="truncate">${t2Name}</span>
                        <span class="score-box">${m.s2 || 0}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
