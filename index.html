<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Bracket - 100% Fit View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            background-color: #000; 
            color: white; 
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden; /* No scrolling allowed */
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 2px;
        }

        /* All zones use vh (Viewport Height) to guarantee they fit on one screen */
        .winners-zone { height: 44vh; border: 1px solid #1e293b; margin-bottom: 2px; display: flex; flex-direction: column; }
        .finals-zone { height: 10vh; border: 2px solid #0ea5e9; margin-bottom: 2px; background: #082f49; display: flex; align-items: center; justify-content: center; }
        .losers-zone { height: 44vh; border: 1px solid #431407; display: flex; flex-direction: column; }

        .zone-label {
            font-size: 1.5vh;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            background: #111;
            padding: 2px 0;
            letter-spacing: 2px;
        }

        .rounds-container {
            display: flex;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        .round-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Spreads matches evenly top-to-bottom */
            border-right: 1px solid #1e293b;
            padding: 0 2px;
        }

        /* THE CARD - Optimized for narrow split-screen */
        .match-card {
            width: 100%;
            background: #111;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            /* Adaptive height based on screen size */
            max-height: 8vh; 
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4vh 6px;
            font-size: 1.6vh; /* Text scales with TV height */
            font-weight: 700;
            border-bottom: 1px solid #000;
            white-space: nowrap;
            overflow: hidden;
        }

        /* High Contrast for distance */
        .team-row.win { background: #0ea5e9 !important; color: #000 !important; font-weight: 900; }
        .team-row:nth-child(even) { background: #161b22; }

        .name-txt {
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .score-box {
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 0 6px;
            border-radius: 2px;
            font-family: monospace;
            font-size: 1.8vh;
            margin-left: 4px;
        }

        .win .score-box { background: #fff; color: #000; }

        .finals-match-wrap { width: 90%; max-width: 400px; }

    </style>
</head>
<body>

    <div class="main-layout">
        
        <!-- WINNERS TOP -->
        <div class="winners-zone">
            <div class="zone-label text-sky-400">Winners Bracket</div>
            <div class="rounds-container" id="winnersContent"></div>
        </div>

        <!-- CHAMPIONSHIP MIDDLE -->
        <div class="finals-zone" id="finalsContent"></div>

        <!-- LOSERS BOTTOM -->
        <div class="losers-zone">
            <div class="zone-label text-orange-500">Losers Bracket</div>
            <div class="rounds-container" id="losersContent"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) render(snap.data());
        });

        function render(data) {
            const b = data.bracket;
            const rosterSize = data.roster?.length || 2;
            const size = Math.pow(2, Math.ceil(Math.log2(rosterSize)));
            const wRounds = Math.log2(size);

            // 1. Winners
            let wHtml = "";
            for (let r = 1; r <= wRounds; r++) {
                wHtml += `<div class="round-column">`;
                wHtml += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => createCard(m)).join('');
                wHtml += `</div>`;
            }
            document.getElementById('winnersContent').innerHTML = wHtml;

            // 2. Finals
            const gf = b.winners.find(x => x.id.startsWith('GF'));
            document.getElementById('finalsContent').innerHTML = `
                <div class="flex items-center gap-4 w-full justify-center">
                    <div class="text-white font-black italic text-[2vh]">FINALS</div>
                    <div class="finals-match-wrap">${createCard(gf)}</div>
                </div>
            `;

            // 3. Losers
            let lHtml = "";
            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                lHtml += `<div class="round-column">`;
                lHtml += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => createCard(m)).join('');
                lHtml += `</div>`;
            }
            document.getElementById('losersContent').innerHTML = lHtml;
        }

        function createCard(m) {
            if (!m) return "";
            const t1 = m.t1?.name || 'TBD';
            const t2 = m.t2?.name || 'TBD';
            const isBye = m.s1 === 'BYE' || m.s2 === 'BYE';
            
            return `
                <div class="match-card">
                    <div class="team-row ${m.win === t1 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t1}</span>
                        <span class="score-box">${m.s1 || 0}</span>
                    </div>
                    <div class="team-row ${m.win === t2 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t2}</span>
                        <span class="score-box">${m.s2 || 0}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
