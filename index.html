<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Bracket - Compact TV View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            background-color: #000; 
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Strictly no scrolling */
        }

        /* Full Screen Layout Wrapper */
        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        /* Section Containers (Winners, Finals, Losers) */
        .bracket-zone {
            flex: 1; /* Distributes height evenly */
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 5px;
            min-height: 0; /* Prevents overflow */
        }

        .zone-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: #0ea5e9;
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-align: center;
            opacity: 0.8;
        }

        /* Rounds Container */
        .rounds-grid {
            display: flex;
            flex: 1;
            gap: 8px;
            min-height: 0;
        }

        .round-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .round-header {
            font-size: 8px;
            text-align: center;
            color: #475569;
            text-transform: uppercase;
            font-weight: 900;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 2px;
        }

        /* THE COMPACT CARD: Side-by-side names to save height */
        .match-card {
            background: #111;
            border: 1.5px solid #334155;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .match-card.active { border-color: #0ea5e9; box-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }

        .team-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            font-size: 11px; /* Scaled for TV */
            font-weight: 900;
            border-bottom: 1px solid #000;
            white-space: nowrap;
        }

        .team-strip.win { background: #0ea5e9; color: #000; }
        
        .name-txt {
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .score-val {
            background: rgba(0,0,0,0.5);
            padding: 0px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            margin-left: 5px;
        }

        .win .score-val { background: #fff; color: #000; }

        /* Finals Zone - Special Styling */
        .finals-zone {
            flex: 0.4; /* Smaller height for the single championship match */
            background: linear-gradient(to right, #000, #082f49, #000);
            border: 2px solid #0ea5e9;
        }

        .finals-match {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .finals-card { width: 80%; transform: scale(1.1); }

    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- TOP: WINNERS -->
        <div class="bracket-zone">
            <div class="zone-label">Winners Bracket</div>
            <div class="rounds-grid" id="winnersContent"></div>
        </div>

        <!-- MIDDLE: CHAMPIONSHIP -->
        <div class="bracket-zone finals-zone">
            <div class="zone-label text-white">Championship Final</div>
            <div class="finals-match" id="finalsContent"></div>
        </div>

        <!-- BOTTOM: LOSERS -->
        <div class="bracket-zone">
            <div class="zone-label text-orange-500">Losers Bracket</div>
            <div class="rounds-grid" id="losersContent"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) render(snap.data());
        });

        function render(data) {
            const b = data.bracket;
            const size = Math.pow(2, Math.ceil(Math.log2(data.roster?.length || 2)));
            const wRounds = Math.log2(size);

            // 1. Render Winners
            let wHtml = "";
            for (let r = 1; r <= wRounds; r++) {
                wHtml += `<div class="round-col"><div class="round-header">R${r}</div>`;
                wHtml += b.winners.filter(x => x.id.startsWith(`W${r}-`)).map(m => createCard(m)).join('');
                wHtml += `</div>`;
            }
            document.getElementById('winnersContent').innerHTML = wHtml;

            // 2. Render Finals
            const gf = b.winners.find(x => x.id.startsWith('GF'));
            document.getElementById('finalsContent').innerHTML = `<div class="finals-card">${createCard(gf)}</div>`;

            // 3. Render Losers
            let lHtml = "";
            const maxLR = (wRounds - 1) * 2;
            for (let r = 1; r <= maxLR; r++) {
                lHtml += `<div class="round-col"><div class="round-header">L${r}</div>`;
                lHtml += b.losers.filter(x => x.id.startsWith(`L${r}-`)).map(m => createCard(m)).join('');
                lHtml += `</div>`;
            }
            document.getElementById('losersContent').innerHTML = lHtml;
        }

        function createCard(m) {
            if (!m) return "";
            const t1 = m.t1?.name || 'TBD';
            const t2 = m.t2?.name || 'TBD';
            const isBye = m.s1 === 'BYE' || m.s2 === 'BYE';
            
            return `
                <div class="match-card ${!m.win && t1 !== 'TBD' && t2 !== 'TBD' ? 'active' : ''}">
                    <div class="team-strip ${m.win === t1 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t1}</span>
                        <span class="score-val">${m.s1 || 0}</span>
                    </div>
                    <div class="team-strip ${m.win === t2 && !isBye ? 'win' : ''}">
                        <span class="name-txt">${t2}</span>
                        <span class="score-val">${m.s2 || 0}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
